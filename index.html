<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Proportion</title>
  <style>
    :root{
      /* Light mode (default) */
      --bg:#f6f7fb;
      --panel:#ffffff;
      --panel2:rgba(255,255,255,.75);
      --border:rgba(15,23,42,.10);
      --border2:rgba(15,23,42,.16);
      --text:rgba(15,23,42,.92);
      --muted:rgba(15,23,42,.62);
      --muted2:rgba(15,23,42,.45);
      --primary:#3b82f6;
      --primary-bg:rgba(59,130,246,.12);
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(2,6,23,.10);
      --r-xl:24px;
      --r-lg:18px;
    }

    body[data-theme="dark"]{
      --bg:#0b0d12;
      --panel:rgba(255,255,255,.03);
      --panel2:rgba(255,255,255,.02);
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.16);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.45);
      --primary:#7aa2ff;
      --primary-bg:rgba(122,162,255,.12);
      --danger:#ff6b6b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 800px at 50% -200px, rgba(59,130,246,.14), transparent 60%),
        var(--bg);
      color:var(--text);
    }

    body[data-theme="dark"]{
      background:
        radial-gradient(1200px 800px at 50% -200px, rgba(122,162,255,.18), transparent 60%),
        var(--bg);
    }
    }
    .wrap{max-width:860px;margin:0 auto;padding:48px 16px 60px}
    .header{text-align:center;margin-bottom:28px;margin-top:50px;}
    .kicker{font-size:15px;color:var(--muted2);margin-top: 3px;}
    h1{margin:6px 0 0;font-size:32px;letter-spacing:-.02em}
    .card{
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:var(--r-xl);
      padding:22px;
      box-shadow:var(--shadow);
    }
    .row{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:center;padding:8px 0 4px}
    .eq{font-size:34px;font-weight:650;opacity:.9}
    .fraction{display:inline-flex;flex-direction:column;align-items:center;justify-content:center}
    .line{width:112px;height:3px;background:rgba(255,255,255,.18);margin:6px 0}
    .cell{display:inline-flex;align-items:center;gap:10px}
    .num{
      width:112px;height:40px;border-radius:var(--r-lg);
      border:1px solid var(--border2);
      background:var(--panel2);
      color:var(--text);
      outline:none;text-align:center;font-size:16px;
      transition:box-shadow .15s ease,border-color .15s ease;
    }
    .num:focus{border-color:rgba(122,162,255,.5);box-shadow:0 0 0 3px rgba(122,162,255,.18)}
    .label{
      width:88px;height:28px;border-radius:12px;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--muted);
      outline:none;font-size:12px;padding:0 10px;
      transition:box-shadow .15s ease,border-color .15s ease;
      text-align: center;
    }
    .label:focus{border-color:rgba(122,162,255,.35);box-shadow:0 0 0 3px rgba(122,162,255,.12)}
    .xbox{
      width:112px;height:40px;border-radius:var(--r-lg);
      background:rgba(122,162,255,.10);
      border:1px solid rgba(122,162,255,.38);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:700;letter-spacing:.01em;
    }
    .btnbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;margin-top:10px}
    button{
      height:40px;padding:0 14px;border-radius:var(--r-lg);
      border:1px solid var(--border2);
      background:rgba(15,23,42,.03);
      color:var(--text);
      font-weight:600;cursor:pointer;
      transition:transform .06s ease,background .15s ease,border-color .15s ease,opacity .15s ease;
    }
    body[data-theme="light"] .line{background: #000;}
    body[data-theme="dark"] button{ background:rgba(255,255,255,.04); }
      color:var(--text);
      font-weight:600;cursor:pointer;
      transition:transform .06s ease,background .15s ease,border-color .15s ease,opacity .15s ease;
    }
    button:hover{background:rgba(15,23,42,.05)}
    body[data-theme="dark"] button:hover{background:rgba(255,255,255,.06)}
    button:active{transform:translateY(1px)}
    button.primary{background:rgba(122,162,255,.16);border-color:rgba(122,162,255,.45)}
    button.primary:hover{background:rgba(122,162,255,.20)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .status{min-height:30px;text-align:center;margin-top:14px}
    .badge{
      display:inline-flex;align-items:center;height:24px;padding:0 10px;
      border-radius:999px;border:1px solid var(--border);
      background:rgba(15,23,42,.03);
      color:var(--muted);font-size:12px;margin-right:8px;
    }
    body[data-theme="dark"] .badge{background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.12);}
      color:var(--muted);font-size:12px;margin-right:8px;
    }
    .xmark{
      display:inline-flex;align-items:center;border-radius:12px;padding:2px 8px;
      background:var(--primary-bg);
      border:1px solid rgba(122,162,255,.42);
      color:var(--primary);
      font-weight:700;
    }
    .error{color:var(--danger);font-size:13px;margin-top:6px}
    .hint{color:var(--muted2);font-size:13px}
    .explain{margin:10px auto 0;max-width:640px;text-align:center;color:var(--muted);font-size:13px;line-height:1.45}
    /* Theme toggle (small, bottom) */
    .themeRow{display:flex;justify-content:center;margin-top:24px}
    .toggle{
      display:inline-flex;align-items:center;gap:8px;
      padding:4px 8px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(15,23,42,.03);
      color:var(--muted);
      font-size:12px;
      user-select:none;
    }
    body[data-theme="dark"] .toggle{background:rgba(255,255,255,.04);}

    .switch{position:relative;display:inline-block;width:36px;height:20px}
    .switch input{opacity:0;width:0;height:0}
    .slider{
      position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
      background:rgba(15,23,42,.14);
      border:1px solid var(--border2);
      transition:.15s;
      border-radius:999px;
    }
    body[data-theme="dark"] .slider{background:rgba(255,255,255,.12);}

    .slider:before{
      position:absolute;content:"";
      height:14px;width:14px;left:2px;top:2px;
      background:var(--panel);
      border:1px solid var(--border2);
      transition:.15s;
      border-radius:999px;
    }
    input:checked + .slider{background:var(--primary-bg)}
    input:checked + .slider:before{transform:translateX(16px)}

    @media (max-width:520px){
      .num{width:104px}
      .line{width:104px}
      .xbox{width:104px}
      .label{width:80px}
      h1{font-size:28px}
    }
      .line{width:104px}
      .xbox{width:104px}
      .label{width:80px}
      h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Simple Proportion</h1>
      <div class="kicker">Solve for x</div>
    </div>
      
    </div>

    <div class="card">
      <div class="row" aria-label="equation">
        <div class="fraction">
          <div class="cell">
            <div class="xbox" id="xBoxTop" style="display:none">x</div>
            <input class="num" id="aTop" type="text" inputmode="decimal" placeholder="value" style="display:none" />
            <input class="label" id="xLabelTop" type="text" placeholder="unit" style="display:none" />
            <input class="label" id="aLabelTop" type="text" placeholder="unit" style="display:none" />
          </div>
          <div class="line"></div>
          <div class="cell">
            <div class="xbox" id="xBoxBottom">x</div>
            <input class="num" id="aBottom" type="text" inputmode="decimal" placeholder="value" />
            <input class="label" id="xLabelBottom" type="text" placeholder="unit" />
            <input class="label" id="aLabelBottom" type="text" placeholder="unit" />
          </div>
        </div>

        <div class="eq">=</div>

        <div class="fraction">
          <div class="cell">
            <input class="num" id="b" type="text" inputmode="decimal" placeholder="value" />
            <input class="label" id="bLabel" type="text" placeholder="unit" />
          </div>
          <div class="line"></div>
          <div class="cell">
            <input class="num" id="c" type="text" inputmode="decimal" placeholder="value" />
            <input class="label" id="cLabel" type="text" placeholder="unit" />
          </div>
        </div>
      </div>

      <div class="btnbar">
        <button id="swap" type="button">Swap X</button>
        <button id="solve" type="button" class="primary" disabled>Solve for x</button>
        <button id="reset" type="button">Reset</button>
      </div>

      <div class="status" aria-live="polite">
        <div id="statusLine" class="hint">Enter values and click Solve.</div>
        <div id="errorLine" class="error" style="display:none"></div>
      </div>

      <div id="explain" class="explain" style="display:none"></div>
          <div class="themeRow" aria-label="theme toggle">
        <div class="toggle">
          <span>Light</span>
          <label class="switch" title="Toggle dark mode">
            <input id="themeToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
          <span>Dark</span>
        </div>
      </div>
    </div>

  <script>
    // Theme (light default) — persisted in localStorage
    var themeToggle = document.getElementById("themeToggle");
    var themeLabel = document.getElementById("themeLabel");

    function applyTheme(mode){
      document.body.setAttribute("data-theme", mode);
      if (themeToggle) themeToggle.checked = (mode === "dark");
      if (themeLabel) themeLabel.textContent = "Light";
    }

    function setTheme(mode){
      applyTheme(mode);
      try { localStorage.setItem("proportion_theme", mode); } catch (e) {}
    }

    (function initTheme(){
      var saved = null;
      try { saved = localStorage.getItem("proportion_theme"); } catch (e) {}
      var mode = (saved === "dark" || saved === "light") ? saved : "light";
      applyTheme(mode);
    })();

    if (themeToggle){
      themeToggle.addEventListener("change", function(){
        setTheme(themeToggle.checked ? "dark" : "light");
      });
    }

    var xPosition = "num"; // num => x/a, den => a/x
    var lastX = null;
    var lastXUnit = "";

    var aTop = document.getElementById("aTop");
    var aBottom = document.getElementById("aBottom");
    var aLabelTop = document.getElementById("aLabelTop");
    var aLabelBottom = document.getElementById("aLabelBottom");

    var b = document.getElementById("b");
    var c = document.getElementById("c");
    var bLabel = document.getElementById("bLabel");
    var cLabel = document.getElementById("cLabel");

    var xBoxTop = document.getElementById("xBoxTop");
    var xBoxBottom = document.getElementById("xBoxBottom");
    var xLabelTop = document.getElementById("xLabelTop");
    var xLabelBottom = document.getElementById("xLabelBottom");

    var swapBtn = document.getElementById("swap");
    var solveBtn = document.getElementById("solve");
    var resetBtn = document.getElementById("reset");

    var statusLine = document.getElementById("statusLine");
    var errorLine = document.getElementById("errorLine");
    var explain = document.getElementById("explain");

    function stripSpaces(s){
      var str = String(s == null ? "" : s);
      var out = "";
      for (var i=0; i<str.length; i++){
        var code = str.charCodeAt(i);
        if (code !== 32 && code !== 9 && code !== 10 && code !== 13) out += str[i];
      }
      return out;
    }

    function sanitizeNumberDraft(next, prev){
      if (typeof next !== "string") return prev;

      // Allow only digits, dot, whitespace
      for (var i=0; i<next.length; i++){
        var ch = next[i];
        var code = next.charCodeAt(i);
        var isDigit = ch >= "0" && ch <= "9";
        var isSpace = (code === 32 || code === 9 || code === 10 || code === 13);
        if (!isDigit && ch !== "." && !isSpace) return prev;
      }

      var compact = stripSpaces(next);
      if (compact === "" || compact === ".") return next;

      // Only one dot
      var dotSeen = false;
      for (var j=0; j<compact.length; j++){
        if (compact[j] === "."){
          if (dotSeen) return prev;
          dotSeen = true;
        }
      }

      // Max one digit after dot
      var dotPos = -1;
      for (var k=0; k<compact.length; k++){
        if (compact[k] === "."){ dotPos = k; break; }
      }
      if (dotPos !== -1){
        var fracLen = compact.length - dotPos - 1;
        if (fracLen > 1) return prev;
      }

      return next;
    }

    function autoZeroPrefixOnBlur(v){
      var compact = stripSpaces(v);
      if (compact.length > 0 && compact[0] === ".") return "0" + compact;
      return v;
    }

    function isCompleteNumberString(v){
      var t = stripSpaces(v);
      if (t === "" || t === ".") return false;
      if (t[t.length-1] === ".") return false;

      var dotSeen = false;
      var fracLen = 0;
      for (var i=0; i<t.length; i++){
        var ch = t[i];
        if (ch === "."){
          if (dotSeen) return false;
          dotSeen = true;
          continue;
        }
        if (ch < "0" || ch > "9") return false;
        if (dotSeen) fracLen++;
      }
      if (dotSeen && fracLen !== 1) return false;
      return true;
    }

    function parseNonNegativeNumber(v){
      return Number(stripSpaces(v));
    }

    function fmtValUnit(val, unit){
      var u = String(unit || "").trim();
      return u ? (val + " " + u) : val;
    }

    function escapeHtml(s){
      var out = String(s);
      out = out.split("&").join("&amp;");
      out = out.split("<").join("&lt;");
      out = out.split(">").join("&gt;");
      out = out.split('"').join("&quot;");
      out = out.split("'").join("&#39;");
      return out;
    }

    function getAInput(){ return xPosition === "num" ? aBottom : aTop; }
    function getALabel(){ return xPosition === "num" ? aLabelBottom : aLabelTop; }
    function getXLabel(){ return xPosition === "num" ? xLabelTop : xLabelBottom; }

    function showError(msg){
      if (msg){
        errorLine.style.display = "block";
        errorLine.textContent = msg;
      } else {
        errorLine.style.display = "none";
        errorLine.textContent = "";
      }
    }

    function canSolveNow(){
      if (!isCompleteNumberString(getAInput().value)) return false;
      if (!isCompleteNumberString(b.value)) return false;
      if (!isCompleteNumberString(c.value)) return false;
      var B = parseNonNegativeNumber(b.value);
      var C = parseNonNegativeNumber(c.value);
      return (xPosition === "num") ? (C !== 0) : (B !== 0);
    }

    function solveProportion(){
      var A = parseNonNegativeNumber(getAInput().value);
      var B = parseNonNegativeNumber(b.value);
      var C = parseNonNegativeNumber(c.value);

      if (!isFinite(A) || !isFinite(B) || !isFinite(C)){
        return { ok:false, error:"Please enter numbers for all three boxes." };
      }

      if (xPosition === "num"){
        if (C === 0) return { ok:false, error:"The right denominator can't be 0." };
        return { ok:true, x:(A * B) / C };
      }

      if (B === 0) return { ok:false, error:"The right numerator can't be 0." };
      return { ok:true, x:(A * C) / B };
    }

    function layoutForX(){
      if (xPosition === "num"){
        xBoxTop.style.display = "flex";
        xLabelTop.style.display = "block";
        aTop.style.display = "none";
        aLabelTop.style.display = "none";

        xBoxBottom.style.display = "none";
        xLabelBottom.style.display = "none";
        aBottom.style.display = "block";
        aLabelBottom.style.display = "block";
      } else {
        xBoxTop.style.display = "none";
        xLabelTop.style.display = "none";
        aTop.style.display = "block";
        aLabelTop.style.display = "block";

        xBoxBottom.style.display = "flex";
        xLabelBottom.style.display = "block";
        aBottom.style.display = "none";
        aLabelBottom.style.display = "none";
      }
    }

    function render(){
      solveBtn.disabled = !canSolveNow();

      if (lastX !== null){
        var payload = String(lastX) + (lastXUnit ? (" " + lastXUnit) : "");
        statusLine.innerHTML = "<span class=\"badge\">Result</span> <span class=\"xmark\">x</span> = <span class=\"xmark\">" + escapeHtml(payload) + "</span>";
      } else {
        statusLine.textContent = "Enter values and click Solve.";
      }

      if (lastX !== null && !errorLine.textContent){
        var aVal = stripSpaces(getAInput().value);
        var bVal = stripSpaces(b.value);
        var cVal = stripSpaces(c.value);

        var aUnit = String(getALabel().value || "").trim();
        var bUnit = String(bLabel.value || "").trim();
        var cUnit = String(cLabel.value || "").trim();
        var xUnit = String(lastXUnit || "").trim();

        var aText = fmtValUnit(aVal, aUnit);
        var rateText = fmtValUnit(bVal, bUnit) + " per " + fmtValUnit(cVal, cUnit);
        var xText = fmtValUnit(String(lastX), xUnit);

        explain.style.display = "block";
        explain.innerHTML = "This means that for every " + escapeHtml(aText) + ", you should have <span class=\"xmark\">" + escapeHtml(xText) + "</span> at the same rate as " + escapeHtml(rateText) + ".";
      } else {
        explain.style.display = "none";
        explain.innerHTML = "";
      }
    }

    function attachNumeric(el){
      el.addEventListener("input", function(){
        var prev = el.getAttribute("data-prev") || "";
        var next = sanitizeNumberDraft(el.value, prev);
        el.value = next;
        el.setAttribute("data-prev", next);
        showError("");
        render();
      });
      el.addEventListener("blur", function(){
        el.value = autoZeroPrefixOnBlur(el.value);
        el.setAttribute("data-prev", el.value);
        render();
      });
      el.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          e.preventDefault();
          if (canSolveNow()) doSolve();
        }
      });
    }

    function attachLabel(el){
      el.addEventListener("input", function(){ showError(""); render(); });
      el.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          e.preventDefault();
          if (canSolveNow()) doSolve();
        }
      });
    }

    function doSolve(){
      showError("");
      if (!canSolveNow()){
        showError("Please complete all three numbers.");
        render();
        return;
      }
      var res = solveProportion();
      if (!res.ok){
        showError(res.error);
        render();
        return;
      }
      lastX = res.x;
      lastXUnit = String(getXLabel().value || "").trim();
      render();
    }

    function doReset(){
      aTop.value = ""; aBottom.value = "";
      aLabelTop.value = ""; aLabelBottom.value = "";
      b.value = ""; c.value = "";
      bLabel.value = ""; cLabel.value = "";
      xLabelTop.value = ""; xLabelBottom.value = "";

      aTop.setAttribute("data-prev", "");
      aBottom.setAttribute("data-prev", "");
      b.setAttribute("data-prev", "");
      c.setAttribute("data-prev", "");

      xPosition = "num";
      lastX = null;
      lastXUnit = "";
      showError("");
      layoutForX();
      render();
    }

    function doSwap(){
      if (lastX !== null){ lastX = null; lastXUnit = ""; }
      showError("");
      xPosition = (xPosition === "num") ? "den" : "num";
      layoutForX();
      render();
    }

    attachNumeric(aTop);
    attachNumeric(aBottom);
    attachNumeric(b);
    attachNumeric(c);

    attachLabel(aLabelTop);
    attachLabel(aLabelBottom);
    attachLabel(bLabel);
    attachLabel(cLabel);
    attachLabel(xLabelTop);
    attachLabel(xLabelBottom);

    solveBtn.addEventListener("click", doSolve);
    resetBtn.addEventListener("click", doReset);
    swapBtn.addEventListener("click", doSwap);

    layoutForX();
    render();
  </script>
</body>
</html>
